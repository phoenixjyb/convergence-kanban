name: Feature request
description: Suggest a new feature, integration, or workflow improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas you'd rather discuss than file as a concrete request,
        [Discussions](https://github.com/phoenixjyb/convergence-kanban/discussions) is the better venue.

  - type: textarea
    id: problem
    attributes:
      label: Problem you're hitting
      description: What's painful today? Concrete examples help more than abstract requirements.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like ConvergenceKanban to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, workarounds you tried, or how other tools solve this.
    validations:
      required: false

  - type: dropdown
    id: pr
    attributes:
      label: Are you willing to send a PR?
      description: No pressure — but it helps me know whether to prioritize design discussion or just review your work.
      options:
        - "Yes"
        - "Maybe / I'd need pointers"
        - "No"
    validations:
      required: true
